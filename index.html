<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Tour Virtual com Hotspot</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script>
      // Componente para mostrar/esconder o popup
      AFRAME.registerComponent('hotspot-interaction-1', {
        init: function () {
          var el = this.el;
          var popup = document.querySelector('#popup-info-1');

          el.addEventListener('mouseenter', function () {
            popup.setAttribute('visible', 'true');
            el.setAttribute('color', '#00FF00'); // Muda cor do ponto ao focar
          });

          el.addEventListener('mouseleave', function () {
            popup.setAttribute('visible', 'false');
            el.setAttribute('color', '#FF0000');
          });
        }
      });

      AFRAME.registerComponent('hotspot-interaction-2', {
        init: function () {
          var el = this.el;
          var popup = document.querySelector('#popup-info-2');

          el.addEventListener('mouseenter', function () {
            popup.setAttribute('visible', 'true');
            el.setAttribute('color', '#00FF00'); // Muda cor do ponto ao focar
          });

          el.addEventListener('mouseleave', function () {
            popup.setAttribute('visible', 'false');
            el.setAttribute('color', '#FF0000');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="cenario-ascenty" src="ambiente_360.jpg">
      </a-assets>

      <a-sky src="#cenario-ascenty" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="#FFF"></a-cursor>
        
        <a-plane id="popup-info-1" 
                 position="0 0 -1" 
                 width="0.8" height="0.4" 
                 color="#000" 
                 opacity="0.8" 
                 visible="false"
                 text="value: Servidor Rack 04\nStatus: Online\nTemperatura: 18C; align: center; color: #FFF">
        </a-plane>
        <a-plane id="popup-info-2" 
                 position="0 0 -1" 
                 width="0.8" height="0.4" 
                 color="#000" 
                 opacity="0.8" 
                 visible="false"
                 text="value: Servidor Rack 04\nStatus: Online\nTemperatura: 18C; align: center; color: #FFF">
        </a-plane>
      </a-entity>

      <a-sphere id="ponto-interesse-1" 
                position="2 1.5 -3" 
                radius="0.1" 
                color="#FF0000" 
                hotspot-interaction-1>
      </a-sphere>

      <a-sphere id="ponto-interesse-2" 
                position="-0.38125 2.87486 -3.6646" 
                radius="0.1" color="#FF0000" 
                hotspot-interaction-2>
      </a-sphere>

    </a-scene>
  </body>
</html>
