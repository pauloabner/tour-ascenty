<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <title>Tour Virtual 360 - Ascenty</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="cenario-ascenty" src="ambiente_360.jpg">
      </a-assets>

      <a-sky src="#cenario-ascenty" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
